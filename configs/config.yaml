# ==============================================================================
# Physics-Informed GAN (PIC-GAN) Configuration (Hydra syntax)
# ==============================================================================

defaults:
  - _self_

# Global reproducibility seed
seed: 42

# Directory and file paths
paths:
  raw_data_dir: "data/raw/"
  raw_data_file: "data/raw/all_battery_data_sampled.csv"

# GAN and Autoencoder Latent/Sequence settings
model:
  latent_dim: 32        # Dimension of the AE bottleneck / GAN latent space
  noise_dim: 16         # Dimension of the generator noise vector
  cond_dim: 1           # Dimension of the conditioning variable (capacity)
  sequence_length: 64   # Fixed timestep length for padded sequences
  lstm_units: 64        # LSTM hidden units for encoder / decoder

# WGAN-GP and general training hyperparameters
training:
  batch_size: 64
  ae_epochs: 50              # Autoencoder pre-training epochs
  epochs_gan: 2000           # Number of GAN training epochs
  n_critic: 5                # Discriminator steps per generator step
  lambda_gp: 10.0            # Gradient penalty coefficient
  lambda_physics: 1.0        # Physics loss weighting (soc_monotonicity / advanced)
  lambda_rc: 1.0             # RC circuit loss weighting
  lambda_soc: 5.0            # SOC monotonicity weighting (when used standalone)
  log_every: 100             # Print metrics every N epochs
  shuffle_buffer: 10000      # tf.data shuffle buffer size
  soh_pretrain_epochs: 20    # Epochs for synthetic pre-training of SOH regressor
  soh_finetune_epochs: 10    # Epochs for real fine-tuning of SOH regressor
  soh_baseline_epochs: 10    # Epochs for real-only SOH baseline

# Feature column indices (position in DEFAULT_FEATURES list in src/data/sequences.py)
# Used to pass to physics losses without hardcoding integers anywhere
feature_indices:
  volt: 0    # Average_Cell_Voltage
  curr: 1    # Charging_Current
  soc: 6     # SOC
  temp: 4    # Max_Cell_Temperature

# Generation and evaluation settings
n_synthetic: 5000          # Number of synthetic cycles to generate
physics_mode: soc          # Generator physics loss mode: soc | advanced | rc

# Evaluation metric and visualization settings
evaluation:
  n_bins: 50               # Histogram bins for JS divergence
  autocorr_max_lag: 20     # Maximum lag for autocorrelation fidelity
  n_samples_viz: 1000      # Subsample cap for t-SNE / PCA
  n_sequence_samples: 8    # Number of sample sequence pairs for panel plot
  sequence_feature: SOC    # Feature to use for the sequence sample panel
